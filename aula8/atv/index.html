<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>

        <div class="logo">
            <img src="logo.avif" alt="Logo da loja" width="100" height="100"> 
        </div>

        <nav>
            <a href="#"> Home></a>
            <a href="#"> Produtos></a>
            <a href="#"> Contato></a>
            <a href="#"> Sobre></a>
        </nav>

        <button class="botao-carrinho">
            <img src="carrinho.png" alt="carrinho de compras" width="50" height="50">
        </button>

    </header>

    <section class="produtos">

        <h2 id="h21">Produtos em destaque</h2>
        <br>

        <div class="grid">

            <div class="produto">

                <img class="imagens-produtos" src="coca.webp" alt="Coca-cola">

                <h3>Coca-cola 2L</h3>

                <p class="preco">
                    R$ 9,99
                </p>

                <button class="botao-produtos">
                    Comprar
                </button>

            </div>

            <div class="produto">

                <img class="imagens-produtos" src="vigor.webp" alt="Iogurte natural Vigor">

                <h3>Iogurte natural Vigor</h3>

                <p class="preco">
                    R$ 5,99
                </p>

                <button class="botao-produtos">
                    Comprar
                </button>

            </div>

            <div class="produto">

                <img class="imagens-produtos" src="nescau.webp" alt="Nescau Cereal">

                <h3>Nescau Cereal</h3>

                <p class="preco">
                    R$ 10,90
                </p>

                <button class="botao-produtos">
                    Comprar
                </button>
            </div>

        </div>

    </section>

    <footer>



    </footer>
    
</body>
</html>
