<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Cadastro de aluno</h1>

    <form action="#" method="post">

        <legend>Informações pessoais</legend>

        <label for="nome">
            Nome completo:
        </label>

        <input type="text" id="nome" name="nome" placeholder="Digite seu nome aqui" required minlength="3"
        maxlength="50">

        <br>

        <label for="ra">
            RA:
        </label>

        <input type="number" id="ra" name="ra" placeholder="RA(Registro acadêmico)" required>

        <br>

        <label for="email">
            Email:
        </label>

        <input type="email" id="email" name="email" placeholder="meuemail123@exemplo.com" required>

        <br>

        <label for="senha">
            Senha:
        </label>

        <input type="password" id="senha" name="senha" placeholder="minhasenha123" required minlength="8">

        <br>

        <label for="estado">
            Estado(UF):
        </label>

        <select id="estado" name="estado">

            <option value="">
                Selecione
            </option>

            <option value="PR">
                Paraná
            </option>

        </select>

        <br>

        <label for="cidade">
            Cidade:
        </label>

        <input list="cidades" id="cidade" name="cidade" placeholder="Digite ou selecione">

        <datalist id="cidades">

            <option value="Arapongas">
                Arapongas
            </option>

        </datalist>

        <br>
        <br>

        <button type="submit">
            Enviar
        </button>

        <button type="reset">
            Limpar
        </button>

    </form>
    
</body>
</html>
